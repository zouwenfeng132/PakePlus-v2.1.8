<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>🌫️ 雾的工具 - 专业版</title>
    <style>
        /* ===== 移动端适配 ===== */
        @media (max-width: 768px) {
            .card { padding: 15px !important; }
            .upload-grid { grid-template-columns: 1fr !important; gap: 10px !important; }
            .stats-panel { grid-template-columns: repeat(2, 1fr) !important; }
            .features-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)) !important; max-height: 400px !important; }
            .format-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)) !important; }
            .footer-actions { flex-wrap: wrap !important; justify-content: center !important; }
            .sec-btn { padding: 10px 15px !important; font-size: 0.8rem !important; }
            .preview-format-select { max-width: 100px !important; }
            .big-btn, .zip-btn { padding: 12px !important; font-size: 1rem !important; }
            .menu-bar { flex-wrap: wrap !important; }
        }
        
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem !important; }
            .stat-value { font-size: 1.5rem !important; }
            .upload-item { min-height: 90px !important; padding: 10px !important; }
            .feature-item { font-size: 0.8rem !important; padding: 8px 10px !important; }
        }
        
        /* ===== 完整样式 ===== */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: linear-gradient(145deg, #0f111a 0%, #1a1d2b 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        /* 深色主题（默认） */
        body.dark {
            background: linear-gradient(145deg, #0f111a 0%, #1a1d2b 100%);
            color: #e0e6ff;
        }
        body.dark .card {
            background: rgba(28, 31, 48, 0.95);
            border: 1px solid #4f5699;
        }
        body.dark .upload-item,
        body.dark .stat-card,
        body.dark .feature-item,
        body.dark .format-checkbox,
        body.dark .player-container,
        body.dark .subtitle-list,
        body.dark .preview-area,
        body.dark .preview-content,
        body.dark .file-list,
        body.dark .file-item,
        body.dark .current-subtitle,
        body.dark .progress-container,
        body.dark .speed-select,
        body.dark .select-all-btn,
        body.dark .sec-btn,
        body.dark .big-btn,
        body.dark .zip-btn,
        body.dark .preview-format-select,
        body.dark .menu-bar,
        body.dark .menu-btn {
            background: #1e2238;
            border-color: #5a64b0;
            color: #e0e6ff;
        }
        body.dark .progress-bar {
            background: linear-gradient(90deg, #7b86ff, #a7b5ff);
        }
        body.dark .custom-tooltip {
            background: #1a1f3a;
            border-color: #ffd966;
            color: #ffffff;
        }
        
        /* 粉色主题 */
        body.pink {
            background: linear-gradient(145deg, #ffd1e6 0%, #ffb3d1 100%);
            color: #661133;
        }
        body.pink .card {
            background: rgba(255, 240, 245, 0.95);
            border: 1px solid #ff99bb;
        }
        body.pink .upload-item,
        body.pink .stat-card,
        body.pink .feature-item,
        body.pink .format-checkbox,
        body.pink .player-container,
        body.pink .subtitle-list,
        body.pink .preview-area,
        body.pink .preview-content,
        body.pink .file-list,
        body.pink .file-item,
        body.pink .current-subtitle,
        body.pink .progress-container,
        body.pink .speed-select,
        body.pink .select-all-btn,
        body.pink .sec-btn,
        body.pink .big-btn,
        body.pink .zip-btn,
        body.pink .preview-format-select,
        body.pink .menu-bar,
        body.pink .menu-btn {
            background: #ffe6f0;
            border-color: #ff99bb;
            color: #661133;
        }
        body.pink .progress-bar {
            background: linear-gradient(90deg, #ff99bb, #ff4d94);
        }
        body.pink .custom-tooltip {
            background: #ff99bb;
            border-color: #ff4d94;
            color: #661133;
        }
        
        /* 绿色主题 */
        body.green {
            background: linear-gradient(145deg, #d1f0d1 0%, #b3e0b3 100%);
            color: #1a4d1a;
        }
        body.green .card {
            background: rgba(235, 250, 235, 0.95);
            border: 1px solid #99cc99;
        }
        body.green .upload-item,
        body.green .stat-card,
        body.green .feature-item,
        body.green .format-checkbox,
        body.green .player-container,
        body.green .subtitle-list,
        body.green .preview-area,
        body.green .preview-content,
        body.green .file-list,
        body.green .file-item,
        body.green .current-subtitle,
        body.green .progress-container,
        body.green .speed-select,
        body.green .select-all-btn,
        body.green .sec-btn,
        body.green .big-btn,
        body.green .zip-btn,
        body.green .preview-format-select,
        body.green .menu-bar,
        body.green .menu-btn {
            background: #e0f0e0;
            border-color: #99cc99;
            color: #1a4d1a;
        }
        body.green .progress-bar {
            background: linear-gradient(90deg, #99cc99, #2d862d);
        }
        body.green .custom-tooltip {
            background: #99cc99;
            border-color: #2d862d;
            color: #1a4d1a;
        }
        
        /* 清新主题 */
        body.fresh {
            background: linear-gradient(145deg, #d1e9ff 0%, #b3d9ff 100%);
            color: #1a4d73;
        }
        body.fresh .card {
            background: rgba(235, 245, 255, 0.95);
            border: 1px solid #99ccff;
        }
        body.fresh .upload-item,
        body.fresh .stat-card,
        body.fresh .feature-item,
        body.fresh .format-checkbox,
        body.fresh .player-container,
        body.fresh .subtitle-list,
        body.fresh .preview-area,
        body.fresh .preview-content,
        body.fresh .file-list,
        body.fresh .file-item,
        body.fresh .current-subtitle,
        body.fresh .progress-container,
        body.fresh .speed-select,
        body.fresh .select-all-btn,
        body.fresh .sec-btn,
        body.fresh .big-btn,
        body.fresh .zip-btn,
        body.fresh .preview-format-select,
        body.fresh .menu-bar,
        body.fresh .menu-btn {
            background: #e0f0ff;
            border-color: #99ccff;
            color: #1a4d73;
        }
        body.fresh .progress-bar {
            background: linear-gradient(90deg, #99ccff, #4da6ff);
        }
        body.fresh .custom-tooltip {
            background: #99ccff;
            border-color: #4da6ff;
            color: #1a4d73;
        }
        
        .card {
            max-width: 1400px;
            width: 100%;
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 25px 30px;
            transition: all 0.3s ease;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 8px rgba(255, 215, 0, 0.3);
        }
        .badge {
            background: #353d6e;
            padding: 4px 12px;
            border-radius: 30px;
            color: #ffd966;
            font-size: 0.8rem;
            border: 1px solid #6d78cc;
        }
        
        .theme-selector {
            display: flex;
            gap: 8px;
        }
        .theme-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }
        .theme-btn:hover { transform: scale(1.1); }
        .theme-btn.dark { background: #1a1d2b; border-color: #7b86ff; }
        .theme-btn.pink { background: #ff99bb; border-color: #ff4d94; }
        .theme-btn.green { background: #99cc99; border-color: #2d862d; }
        .theme-btn.fresh { background: #99ccff; border-color: #4da6ff; }
        
        /* ===== 菜单栏 ===== */
        .menu-bar {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            padding: 10px;
            border-radius: 50px;
            border: 1px solid;
            flex-wrap: wrap;
        }
        .menu-btn {
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            background: transparent;
        }
        .menu-btn:hover {
            filter: brightness(1.2);
        }
        .menu-divider {
            width: 1px;
            height: 30px;
            background: currentColor;
            opacity: 0.3;
            margin: 0 5px;
        }
        
        /* 三个框并排 */
        .upload-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 15px 0;
        }
        .upload-item {
            border-radius: 20px;
            padding: 15px;
            border: 2px dashed;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }
        .upload-item:hover {
            border-color: #a0acff;
            filter: brightness(1.1);
        }
        .upload-item .icon { font-size: 28px; }
        .upload-item .title {
            font-size: 0.95rem;
            margin-top: 5px;
            font-weight: 500;
        }
        .upload-item .file-name {
            font-size: 0.75rem;
            color: #ffd966;
            margin-top: 3px;
            word-break: break-all;
            max-width: 150px;
            margin-left: auto;
            margin-right: auto;
        }
        .upload-item .format-badge {
            font-size: 0.65rem;
            color: #8e9ae0;
            margin-top: 3px;
        }
        
        .cancel-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ff6b6b;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            border: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .upload-item:hover .cancel-btn { opacity: 1; }
        .cancel-btn:hover {
            background: #ff4d4d;
            transform: scale(1.1);
        }
        
        .file-list-container {
            margin-top: 15px;
            display: none;
        }
        .file-list {
            border-radius: 16px;
            padding: 12px;
            max-height: 100px;
            overflow-x: auto;
            overflow-y: hidden;
            border: 1px solid;
            display: flex;
            gap: 10px;
            white-space: nowrap;
        }
        .file-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 12px;
            border-radius: 12px;
            min-width: 100px;
            border: 1px solid;
            position: relative;
        }
        .file-item .item-icon { font-size: 20px; }
        .file-item .item-name {
            font-size: 0.7rem;
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-item .file-cancel {
            position: absolute;
            top: -3px;
            right: -3px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ff6b6b;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            border: none;
        }
        
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 15px 0;
        }
        .stat-card {
            border-radius: 20px;
            padding: 15px;
            border: 1px solid;
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 600;
            color: #ffd966;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 0.8rem;
            opacity: 0.9;
        }
        
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
            margin: 15px 0;
            max-height: 300px;
            overflow-y: auto;
            padding: 15px;
            border-radius: 24px;
        }
        .feature-item {
            border-radius: 24px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid;
            cursor: help;
            font-size: 0.9rem;
        }
        
        /* 播放器 */
        .player-container {
            border-radius: 24px;
            padding: 20px;
            margin: 15px 0;
            border: 1px solid;
        }
        .audio-title {
            text-align: center;
            font-size: 1rem;
            color: #ffd966;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 1px solid;
        }
        .current-subtitle {
            border-radius: 12px;
            padding: 12px;
            margin: 15px 0;
            text-align: center;
            font-size: 1rem;
            border-left: 4px solid #7b86ff;
            min-height: 50px;
            border: 1px solid;
        }
        .progress-container {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            margin: 15px 0;
            border: 1px solid;
        }
        .progress-bar {
            height: 100%;
            border-radius: 3px;
            width: 0%;
            position: relative;
        }
        .progress-handle {
            width: 14px;
            height: 14px;
            background: #ffd966;
            border-radius: 50%;
            position: absolute;
            top: -5px;
            right: -7px;
            box-shadow: 0 0 10px #ffd966;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .progress-container:hover .progress-handle { opacity: 1; }
        .time-display {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 0.8rem;
            margin: 5px 0;
        }
        .player-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 10px;
        }
        .play-btn {
            background: #7b86ff;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
        }
        .speed-select {
            border-radius: 20px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 0.85rem;
            border: 1px solid;
            background: transparent;
            color: inherit;
        }
        
        .subtitle-list {
            border-radius: 24px;
            padding: 15px;
            margin-top: 15px;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid;
            scroll-behavior: smooth;
        }
        .subtitle-item {
            padding: 8px 12px;
            border-bottom: 1px solid;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .subtitle-item:hover { filter: brightness(1.2); }
        .subtitle-item.active { 
            border-left: 4px solid #ffd966;
            background: rgba(255, 215, 0, 0.1);
        }
        
        .format-multi-select {
            border-radius: 30px;
            padding: 25px;
            margin: 20px 0;
            border: 1px solid;
        }
        .format-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .select-all-bar {
            display: flex;
            gap: 15px;
            margin: 15px 0 20px 0;
            padding-bottom: 15px;
            border-bottom: 1px solid;
        }
        .select-all-btn {
            border: 1px solid;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .format-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
        }
        .format-checkbox {
            border-radius: 40px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid;
            cursor: help;
            font-size: 0.95rem;
        }
        
        /* 下载按钮区域 */
        .download-section {
            display: flex;
            gap: 15px;
            margin: 10px 0;
        }
        .big-btn {
            flex: 1;
            border: 1px solid;
            color: white;
            font-size: 1.2rem;
            padding: 15px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .zip-btn {
            flex: 0.4;
            border: 1px solid;
            color: white;
            font-size: 1.2rem;
            padding: 15px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .big-btn:hover, .zip-btn:hover {
            filter: brightness(1.1);
        }
        
        .preview-area {
            border-radius: 24px;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.95rem;
            flex-wrap: wrap;
            gap: 10px;
        }
        .preview-format-select {
            border: 1px solid;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-right: 10px;
            background: transparent;
        }
        .preview-content {
            border-radius: 16px;
            padding: 12px;
            max-height: 250px;
            overflow: auto;
            font-family: 'Segoe UI', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            border: 1px solid;
            line-height: 1.5;
        }
        .view-toggle {
            background: #2f3762;
            border: 1px solid #707cdb;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        
        .footer-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 15px;
        }
        .sec-btn {
            border: 1px solid;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        
        .custom-tooltip {
            position: fixed;
            padding: 15px 20px;
            border-radius: 16px;
            font-size: 0.95rem;
            max-width: 350px;
            border: 2px solid;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 999999;
            pointer-events: none;
            line-height: 1.6;
            white-space: normal;
            word-wrap: break-word;
        }
        
        .export-count {
            background: #353d6e;
            color: #ffd966;
            padding: 4px 12px;
            border-radius: 30px;
        }
        
        /* 加载提示 */
        .loading-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 40px;
            font-size: 1rem;
            z-index: 10000;
            display: none;
            backdrop-filter: blur(10px);
            border: 1px solid #ffd966;
        }
        
        /* 存档对话框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
        }
        .modal-content {
            background: inherit;
            border: 2px solid;
            border-radius: 30px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-close {
            cursor: pointer;
            font-size: 1.5rem;
        }
        .modal-item {
            padding: 12px;
            border: 1px solid;
            border-radius: 20px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-item:hover {
            filter: brightness(1.2);
        }
        .modal-input {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: 1px solid;
            background: transparent;
            color: inherit;
            margin: 10px 0;
            font-size: 1rem;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
    <!-- 引入JSZip库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="dark">
<!-- 加载提示 -->
<div class="loading-indicator" id="loadingIndicator">⏳ 处理中...</div>

<!-- 存档模态框 -->
<div class="modal" id="saveModal">
    <div class="modal-content">
        <div class="modal-title">
            <span>💾 保存存档</span>
            <span class="modal-close" onclick="closeModal('saveModal')">✕</span>
        </div>
        <input type="text" class="modal-input" id="saveName" placeholder="存档名称" value="我的存档">
        <div style="margin: 15px 0;">已有存档：</div>
        <div id="saveList"></div>
        <div class="modal-buttons">
            <button class="menu-btn" style="flex:1;" onclick="saveArchive()">保存</button>
            <button class="menu-btn" style="flex:1;" onclick="closeModal('saveModal')">取消</button>
        </div>
    </div>
</div>

<div class="modal" id="loadModal">
    <div class="modal-content">
        <div class="modal-title">

<script>
(function() {
    // ===== 状态管理 =====
    let files = [];
    let parsedDataArray = [];
    let subtitles = [];
    let currentFileName = '';
    let currentAudioFile = null;
    let featureFlags = {
        lrc_normal: false, lrc_word: false, bilingual: false, emotion: false,
        overlap: false, speed: false, duplicate: false, assstyle: false,
        screenshot: false, bcc: false, youtube: false,
        tiktok: false, clean: false, stats: false
    };
    let isFullPreview = false;
    let tooltipElement = null;
    let currentPreviewFormat = 'srt';
    
    // 存档系统
    let archives = JSON.parse(localStorage.getItem('fog_archives') || '{}');
    
    // 音频相关
    let audioContext = null;
    let audioBuffer = null;
    let audioSource = null;
    let isPlaying = false;
    let startTime = 0;
    let pauseTime = 0;
    let animationFrame = null;
    let currentSubtitleIndex = -1;
    let audioDuration = 0;
    let isDragging = false;

    // DOM元素
    const subtitleArea = document.getElementById('subtitleArea');
    const audioArea = document.getElementById('audioArea');
    const batchArea = document.getElementById('batchArea');
    const subtitleInput = document.getElementById('subtitleInput');
    const audioInput = document.getElementById('audioInput');
    const batchFileInput = document.getElementById('batchFileInput');
    const subtitleFileName = document.getElementById('subtitleFileName');
    const audioFileName = document.getElementById('audioFileName');
    const audioTitle = document.getElementById('audioTitle');
    const cancelSubtitle = document.getElementById('cancelSubtitle');
    const cancelAudio = document.getElementById('cancelAudio');
    const fileListContainer = document.getElementById('fileListContainer');
    const fileListDiv = document.getElementById('fileList');
    const statsFileCount = document.getElementById('statsFileCount');
    const statTotalLines = document.getElementById('statTotalLines');
    const statTotalDuration = document.getElementById('statTotalDuration');
    const statAvgSpeed = document.getElementById('statAvgSpeed');
    const statCharCount = document.getElementById('statCharCount');
    const processBtn = document.getElementById('processBtn');
    const zipBtn = document.getElementById('zipBtn');
    const previewDiv = document.getElementById('preview');
    const previewFormatSelect = document.getElementById('previewFormatSelect');
    const toggleBtn = document.getElementById('togglePreview');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const saveConfigBtn = document.getElementById('saveConfigBtn');
    const loadConfigBtn = document.getElementById('loadConfigBtn');
    const sampleBtn = document.getElementById('sampleBtn');
    const formatCheckboxes = document.querySelectorAll('.format-cb');
    const selectedCountSpan = document.getElementById('selectedCount');
    const selectAllBtn = document.getElementById('selectAllBtn');
    const deselectAllBtn = document.getElementById('deselectAllBtn');
    const playerContainer = document.getElementById('playerContainer');
    const playBtn = document.getElementById('playBtn');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationTimeSpan = document.getElementById('durationTime');
    const speedSelect = document.getElementById('speedSelect');
    const progressBar = document.getElementById('progressBar');
    const progressHandle = document.getElementById('progressHandle');
    const progressContainer = document.getElementById('progressContainer');
    const currentSubtitle = document.getElementById('currentSubtitle');
    const subtitleItems = document.getElementById('subtitleItems');
    const subtitleList = document.getElementById('subtitleList');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const saveModal = document.getElementById('saveModal');
    const loadModal = document.getElementById('loadModal');
    const saveName = document.getElementById('saveName');
    const saveList = document.getElementById('saveList');
    const loadList = document.getElementById('loadList');

    // ===== 工具函数 =====
    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function msToTime(ms, format) {
        if (!ms) ms = 0;
        const totalSec = Math.floor(ms / 1000);
        const h = Math.floor(totalSec / 3600);
        const m = Math.floor((totalSec % 3600) / 60);
        const s = totalSec % 60;
        const mill = ms % 1000;
        if (format === 'lrc') {
            return `[${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${Math.floor(mill/10).toString().padStart(2,'0')}]`;
        }
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(mill).padStart(3,'0')}`;
    }

    // ===== 新增：滚动到当前字幕 =====
    function scrollToCurrentSubtitle() {
        if (currentSubtitleIndex >= 0 && subtitleItems.children[currentSubtitleIndex]) {
            subtitleItems.children[currentSubtitleIndex].scrollIntoView({
                behavior: 'smooth',
                block: 'center'
            });
        }
    }

    // ===== 预览格式切换 =====
    previewFormatSelect.addEventListener('change', (e) => {
        currentPreviewFormat = e.target.value;
        updatePreview();
    });

    // ===== 取消按钮 =====
    cancelSubtitle.addEventListener('click', (e) => {
        e.stopPropagation();
        subtitleFileName.textContent = '';
        cancelSubtitle.style.display = 'none';
        subtitles = [];
        subtitleList.style.display = 'none';
        updateStatsFromSubtitles();
        updatePreviewFromSubtitles();
        currentFileName = '';
    });

    cancelAudio.addEventListener('click', (e) => {
        e.stopPropagation();
        audioFileName.textContent = '';
        cancelAudio.style.display = 'none';
        audioTitle.textContent = '';
        if (audioSource) {
            audioSource.stop();
            isPlaying = false;
        }
        playerContainer.style.display = 'none';
        audioBuffer = null;
        currentAudioFile = null;
    });

    // ===== 拖拽设置 =====
    function setupDragAndDrop(area, handler, isFileInput = true) {
        area.addEventListener('dragover', (e) => {
            e.preventDefault();
            area.style.borderColor = '#a0acff';
        });
        area.addEventListener('dragleave', () => {
            area.style.borderColor = '';
        });
        area.addEventListener('drop', (e) => {
            e.preventDefault();
            area.style.borderColor = '';
            handler(e.dataTransfer.files);
        });
        if (isFileInput) {
            area.addEventListener('click', () => {
                if (area === subtitleArea) subtitleInput.click();
                else if (area === audioArea) audioInput.click();
                else if (area === batchArea) batchFileInput.click();
            });
        }
    }

    // 字幕处理
    setupDragAndDrop(subtitleArea, (files) => {
        if (files.length > 0) handleSubtitleFile(files[0]);
    });
    subtitleInput.addEventListener('change', (e) => {
        if (e.target.files[0]) handleSubtitleFile(e.target.files[0]);
    });

    async function handleSubtitleFile(file) {
        currentFileName = file.name.replace(/\.[^/.]+$/, '');
        subtitleFileName.textContent = file.name;
        cancelSubtitle.style.display = 'flex';
        const text = await file.text();
        parseSubtitles(text);
        subtitleList.style.display = 'block';
        renderSubtitleList();
        updatePreviewFromSubtitles();
        updateStatsFromSubtitles();
        files = [];
        parsedDataArray = [];
        fileListContainer.style.display = 'none';
    }

    // ===== 音频处理 - 优化加载速度 =====
    setupDragAndDrop(audioArea, (files) => {
        if (files.length > 0) handleAudioFile(files[0]);
    });
    audioInput.addEventListener('change', (e) => {
        if (e.target.files[0]) handleAudioFile(e.target.files[0]);
    });

    async function handleAudioFile(file) {
        currentAudioFile = file;
        audioFileName.textContent = file.name;
        audioTitle.textContent = file.name;
        cancelAudio.style.display = 'flex';
        
        // 显示加载提示
        loadingIndicator.style.display = 'block';
        loadingIndicator.textContent = '⏳ 音频加载中...';
        
        try {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
            }
            
            const arrayBuffer = await file.arrayBuffer();
            
            // 使用requestAnimationFrame让UI更新
            requestAnimationFrame(async () => {
                try {
                    audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                    audioDuration = audioBuffer.duration;
                    durationTimeSpan.textContent = formatTime(audioDuration);
                    playerContainer.style.display = 'block';
                    pauseTime = 0;
                    updateProgress();
                    
                    loadingIndicator.style.display = 'none';
                } catch (e) {
                    console.error('解码错误:', e);
                    loadingIndicator.style.display = 'none';
                    alert('音频解码失败，请检查文件格式');
                }
            });
            
        } catch (e) {
            console.error('读取错误:', e);
            loadingIndicator.style.display = 'none';
            alert('音频读取失败');
        }
    }

    // ===== 批量处理 - 已修复拖拽 =====
    fileListContainer.style.display = 'none';
    
    setupDragAndDrop(batchArea, (files) => {
        const droppedFiles = Array.from(files);
        handleBatchFiles(droppedFiles);
    }, true);
    
    batchFileInput.addEventListener('change', (e) => {
        const selectedFiles = Array.from(e.target.files);
        handleBatchFiles(selectedFiles);
    });

    function handleBatchFiles(batchFiles) {
        const validTypes = ['.json', '.srt', '.lrc', '.ass', '.vtt', '.txt'];
        const validFiles = Array.from(batchFiles).filter(f => 
            validTypes.includes(f.name.substring(f.name.lastIndexOf('.')).toLowerCase())
        );
        
        if (validFiles.length > 0) {
            files = validFiles;
            fileListContainer.style.display = 'block';
            renderFileList();
            parseAllFiles();
            
            // 清空单文件数据
            subtitles = [];
            subtitleList.style.display = 'none';
            subtitleFileName.textContent = '';
            cancelSubtitle.style.display = 'none';
            currentFileName = '';
        }
    }

    // ===== 解析字幕 =====
    function parseSubtitles(text) {
        subtitles = [];
        try {
            const json = JSON.parse(text);
            if (Array.isArray(json)) {
                subtitles = json.map(item => ({
                    start: item.start_time || item.start || 0,
                    end: item.end_time || item.end || (item.start_time + 2000),
                    text: `${item.role || ''}${item.role ? '：' : ''}${item.content || item.text || ''}`
                }));
            }
        } catch (e) {
            // 尝试解析SRT
            const lines = text.split('\n');
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes('-->')) {
                    const times = lines[i].split('-->');
                    const start = timeToMs(times[0].trim());
                    const end = timeToMs(times[1].trim());
                    subtitles.push({ start, end, text: lines[i+1] || '' });
                    i += 2;
                }
            }
            
            // 尝试解析LRC
            if (subtitles.length === 0) {
                const lrcRegex = /\[(\d{2}):(\d{2})\.(\d{2})\](.*)/g;
                let match;
                while ((match = lrcRegex.exec(text)) !== null) {
                    const minutes = parseInt(match[1]);
                    const seconds = parseInt(match[2]);
                    const centiseconds = parseInt(match[3]);
                    const start = (minutes * 60 + seconds) * 1000 + centiseconds * 10;
                    const end = start + 2000;
                    subtitles.push({ start, end, text: match[4].trim() });
                }
            }
        }
        subtitles.sort((a, b) => a.start - b.start);
    }

    function timeToMs(t) {
        const p = t.split(/[:,]/);
        if (p.length === 4) return parseInt(p[0])*3600000 + parseInt(p[1])*60000 + parseInt(p[2])*1000 + parseInt(p[3]);
        return 0;
    }

    // ===== 渲染 =====
    function renderSubtitleList() {
        subtitleItems.innerHTML = '';
        subtitles.forEach((sub, i) => {
            const div = document.createElement('div');
            div.className = 'subtitle-item';
            div.innerHTML = `<span style="color:#ffd966;">${formatTime(sub.start/1000)}</span> → <span style="color:#ffd966;">${formatTime(sub.end/1000)}</span> ${sub.text}`;
            div.addEventListener('click', () => {
                if (audioSource) {
                    audioSource.stop();
                    isPlaying = false;
                    playBtn.textContent = '▶';
                }
                pauseTime = sub.start / 1000;
                updateProgress();
                updateCurrentSubtitle(sub.text);
                
                // 点击时也滚动到对应位置
                currentSubtitleIndex = i;
                scrollToCurrentSubtitle();
            });
            subtitleItems.appendChild(div);
        });
    }

    function renderFileList() {
        if (files.length === 0) { 
            fileListContainer.style.display = 'none';

        files.splice(index, 1);
        if (files.length === 0) {
            fileListContainer.style.display = 'none';
            statsFileCount.innerText = '0';
            parsedDataArray = [];
            updateStats();
            updatePreview();
        } else {
            renderFileList();
            parseAllFiles();
        }
    };

    async function parseAllFiles() {
        parsedDataArray = [];
        for (let f of files) {
            const text = await f.text();
            const data = parseAnyFormat(text);
            if (data.length > 0) {
                parsedDataArray.push({
                    name: f.name.replace(/\.[^/.]+$/, ''),
                    data: data
                });
            }
        }
        updateStats();
        updatePreview();
    }

    function parseAnyFormat(text) {
        // 尝试解析JSON
        try {
            const json = JSON.parse(text);
            if (Array.isArray(json)) {
                return json.map(item => ({
                    start: item.start_time || item.start || 0,
                    end: item.end_time || item.end || (item.start_time + 2000),
                    text: `${item.role || ''}${item.role ? '：' : ''}${item.content || item.text || ''}`
                }));
            }
        } catch (e) {}

        // 尝试解析SRT
        const srtLines = text.split('\n');
        const srtResult = [];
        for (let i = 0; i < srtLines.length; i++) {
            if (srtLines[i].includes('-->')) {
                const times = srtLines[i].split('-->');
                const start = timeToMs(times[0].trim());
                const end = timeToMs(times[1].trim());
                srtResult.push({ start, end, text: srtLines[i+1] || '' });
                i += 2;
            }
        }
        if (srtResult.length > 0) return srtResult;

        // 尝试解析LRC
        const lrcResult = [];
        const lrcRegex = /\[(\d{2}):(\d{2})\.(\d{2})\](.*)/g;
        let match;
        while ((match = lrcRegex.exec(text)) !== null) {
            const minutes = parseInt(match[1]);
            const seconds = parseInt(match[2]);
            const centiseconds = parseInt(match[3]);
            const start = (minutes * 60 + seconds) * 1000 + centiseconds * 10;
            const end = start + 2000;
            lrcResult.push({ start, end, text: match[4].trim() });
        }
        return lrcResult;
    }

    // ===== 统计功能 =====
    function updateStats() {
        let totalLines = 0;
        let totalDur = 0;
        let totalChars = 0;
        
        parsedDataArray.forEach(item => {
            item.data.forEach(i => {
                totalLines++;
                let d = (i.end||0) - (i.start||0);
                if (d>0) totalDur += d;
                totalChars += (i.text||'').length;
            });
        });
        
        statTotalLines.innerText = totalLines;
        statTotalDuration.innerText = (totalDur/1000).toFixed(0);
        statAvgSpeed.innerText = totalDur>0 ? Math.round((totalChars/totalDur)*60000) : 0;
        statCharCount.innerText = totalChars;
    }

    function updateStatsFromSubtitles() {
        let lines = subtitles.length;
        let dur = 0, chars = 0;
        subtitles.forEach(i => {
            let d = i.end - i.start;
            if (d>0) dur += d;
            chars += i.text.length;
        });
        statTotalLines.innerText = lines;
        statTotalDuration.innerText = (dur/1000).toFixed(0);
        statAvgSpeed.innerText = dur>0 ? Math.round((chars/dur)*60000) : 0;
        statCharCount.innerText = chars;
    }

    function updatePreviewFromSubtitles() {
        if (subtitles.length) {
            previewDiv.innerText = convertToFormat(subtitles, currentPreviewFormat);
        } else {
            previewDiv.innerText = '等待文件导入……';
        }
    }

    function updatePreview() {
        if (parsedDataArray.length > 0) {
            if (parsedDataArray[0] && parsedDataArray[0].data) {
                previewDiv.innerText = convertToFormat(parsedDataArray[0].data, currentPreviewFormat);
            }
        } else if (subtitles.length) {
            previewDiv.innerText = convertToFormat(subtitles, currentPreviewFormat);
        } else {
            previewDiv.innerText = '等待文件导入……';
        }
    }

    function updateCurrentSubtitle(text) {
        currentSubtitle.textContent = text || '等待播放……';
    }

    // ===== 播放器控制 =====
    function updateProgress() {
        if (!audioDuration) return;
        const percent = (pauseTime / audioDuration) * 100;
        progressBar.style.width = percent + '%';
        currentTimeSpan.textContent = formatTime(pauseTime);
    }

    playBtn.addEventListener('click', () => {
        if (!audioBuffer) return;
        
        if (isPlaying) {
            audioSource.stop();
            isPlaying = false;
            playBtn.textContent = '▶';
            cancelAnimationFrame(animationFrame);
        } else {
            audioSource = audioContext.createBufferSource();
            audioSource.buffer = audioBuffer;
            
            const rate = parseFloat(speedSelect.value);
            
            // 核心：变速不变调
            audioSource.playbackRate.value = rate;
            audioSource.detune.value = 0;
            if (audioSource.preservesPitch !== undefined) {
                audioSource.preservesPitch = true;
            }
            
            const gainNode = audioContext.createGain();
            gainNode.gain.value = 1.0;
            
            audioSource.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            audioSource.start(0, pauseTime);
            isPlaying = true;
            playBtn.textContent = '⏸';
            startTime = audioContext.currentTime - pauseTime;
            
            function update() {
                if (!isPlaying) return;
                const current = audioContext.currentTime - startTime;
                pauseTime = current;
                currentTimeSpan.textContent = formatTime(current);
                const percent = (current / audioDuration) * 100;
                progressBar.style.width = percent + '%';
                
                const currentMs = current * 1000;
                const active = subtitles.findIndex(s => currentMs >= s.start && currentMs <= s.end);
                if (active !== currentSubtitleIndex) {
                    currentSubtitleIndex = active;
                    if (active !== -1) {
                        updateCurrentSubtitle(subtitles[active].text);
                    }
                    document.querySelectorAll('.subtitle-item').forEach((item,i) => {
                        item.classList.toggle('active', i === active);
                    });
                    
                    // ===== 新增：滚动到当前字幕 =====
                    scrollToCurrentSubtitle();
                }
                animationFrame = requestAnimationFrame(update);
            }
            update();
        }
    });

    speedSelect.addEventListener('change', () => {
        if (audioSource) {
            const rate = parseFloat(speedSelect.value);
            audioSource.playbackRate.value = rate;
            audioSource.detune.value = 0;
            if (audioSource.preservesPitch !== undefined) {
                audioSource.preservesPitch = true;
            }
        }
    });

    progressContainer.addEventListener('mousedown', (e) => {
        isDragging = true;
        seek(e);
    });

    window.addEventListener('mousemove', (e) => {
        if (isDragging) {
            seek(e);
        }
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
    });

    function seek(e) {
        if (!audioBuffer) return;
        const rect = progressContainer.getBoundingClientRect();
        const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
        const percent = x / rect.width;
        pauseTime = percent * audioDuration;
        
        if (isPlaying) {
            audioSource.stop();
            audioSource = audioContext.createBufferSource();
            audioSource.buffer = audioBuffer;
            audioSource.connect(audioContext.destination);
            const rate = parseFloat(speedSelect.value);
            audioSource.playbackRate.value = rate;
            audioSource.detune.value = 0;
            if (audioSource.preservesPitch !== undefined) {
                audioSource.preservesPitch = true;
            }
            audioSource.start(0, pauseTime);
            startTime = audioContext.currentTime - pauseTime;
        }
        
        updateProgress();
        
        const currentMs = pauseTime * 1000;
        const active = subtitles.findIndex(s => currentMs >= s.start && currentMs <= s.end);
        if (active !== currentSubtitleIndex) {
            currentSubtitleIndex = active;
            if (active !== -1) {
                updateCurrentSubtitle(subtitles[active].text);
            }
            document.querySelectorAll('.subtitle-item').forEach((item,i) => {
                item.classList.toggle('active', i === active);
            });
            
            // ===== 新增：滚动到当前字幕 =====
            scrollToCurrentSubtitle();
        }
    }

    // ===== 转换导出 =====
    function convertToFormat(data, format) {
        let lines = [];
        
        data.forEach((item, idx) => {
            let role = '';
            let content = item.text || '';
            
            if (content.includes('：')) {
                const parts = content.split('：');
                role = parts[0];
                content = parts.slice(1).join('：');
            }
            
            let start = item.start || 0;
            let end = item.end || (start + 2000);
            
            if (featureFlags.overlap && idx>0) {
                let prevEnd = data[idx-1].end || 0;
                if (start < prevEnd) start = prevEnd + 100;
            }
            
            if (featureFlags.duplicate && idx>0) {
                let prev = data[idx-1].text || '';
                if (content === prev) return;
            }
            
            const rolePrefix = role ? `${role}：` : '';
            
            if (format === 'lrc') {
                if (featureFlags.lrc_word) {
                    // 逐词LRC
                    let chars = [];
                    for (let char of content) {
                        chars.push(char);
                    }
                    if (chars.length === 0) chars = [content];
                    
                    let totalDur = end - start;
                    let charDur = totalDur / chars.length;
                    
                    chars.forEach((char, i) => {
                        let charStart = start + (i * charDur);
                        if (i === 0) {
                            lines.push(`${msToTime(charStart, 'lrc')}${rolePrefix}${char}`);
                        } else {
                            lines.push(`${msToTime(charStart, 'lrc')}${char}`);
                        }
                    });
                } else {
                    // 普通LRC
                    lines.push(`${msToTime(start, 'lrc')}${rolePrefix}${content}`);
                }
            } else if (format === 'srt') {
                lines.push(`${idx+1}\n${msToTime(start,'srt')} --> ${msToTime(end,'srt')}\n${rolePrefix}${content}\n`);
            } else if (format === 'txt') {
                lines.push(`${rolePrefix}${content}`);
            } else if (format === 'ass') {
                lines.push(`Dialogue: 0,${msToTime(start,'srt').replace(',','.')},${msToTime(end,'srt').replace(',','.')},Default,,0,0,0,,${rolePrefix}${content}`);
            } else if (format === 'vtt') {
                lines.push(`${msToTime(start,'srt').replace(',','.')} --> ${msToTime(end,'srt').replace(',','.')}\n${rolePrefix}${content}\n`);
            } else if (format === 'bcc') {
                lines.push(JSON.stringify({start:start/1000, end:end/1000, content:`${rolePrefix}${content}`}));
            } else if (format === 'json') {
                lines.push(JSON.stringify({start_time:start, end_time:end, role:role, content:content}));
            }
        });
        
        if (format === 'lrc') {
            if (featureFlags.lrc_word) {
                return '[ti:卡拉OK歌词]\n[ar:FOG]\n[by:雾的工具]\n[offset:0]\n' + lines.join('\n');
            }
            return '[ti:歌词]\n[ar:FOG]\n[by:雾的工具]\n[offset:0]\n' + lines.join('\n');
        }
        if (format === 'ass') return '[Script Info]\n[V4+ Styles]\n' + lines.join('\n');
        if (format === 'vtt') return 'WEBVTT\n\n' + lines.join('\n');
        if (format === 'json') return '[' + lines.join(',\n') + ']';
        return lines.join('\n');
    }

    // ===== 存档功能 =====
    window.newProject = function() {
        if (confirm('新建项目将清空所有未保存的数据，确定吗？')) {
            clearAllBtn.click();
            currentFileName = '未命名项目';

    window.openProject = function() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.fog,.json';
        input.onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.subtitles) {
                        subtitles = data.subtitles;
                        currentFileName = data.name || file.name.replace(/\.[^/.]+$/, '');
                        renderSubtitleList();
                        updatePreviewFromSubtitles();
                        updateStatsFromSubtitles();
                        alert('项目加载成功！');
                    }
                } catch (err) {
                    alert('无效的存档文件');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    };

    // 下载所选格式
    processBtn.addEventListener('click', () => {
        if (parsedDataArray.length > 0) {
            const selected = Array.from(formatCheckboxes).filter(cb => cb.checked).map(cb => cb.value);
            if (selected.length === 0) { alert('请选择格式'); return; }
            
            parsedDataArray.forEach(fileData => {
                selected.forEach(f => {
                    const out = convertToFormat(fileData.data, f);
                    const blob = new Blob([out], {type:'text/plain'});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.download = `${fileData.name}.${f}`;
                    a.href = url;
                    a.click();
                    URL.revokeObjectURL(url);
                });
            });
        } else if (subtitles.length > 0) {
            const selected = Array.from(formatCheckboxes).filter(cb => cb.checked).map(cb => cb.value);
            if (selected.length === 0) { alert('请选择格式'); return; }
            
            const baseName = currentFileName || 'output';
            selected.forEach(f => {
                const out = convertToFormat(subtitles, f);
                const blob = new Blob([out], {type:'text/plain'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.download = `${baseName}.${f}`;
                a.href = url;
                a.click();
                URL.revokeObjectURL(url);
            });
        } else {
            alert('请先导入文件');
        }
    });

    // 打包下载
    zipBtn.addEventListener('click', async () => {
        if (parsedDataArray.length === 0 && subtitles.length === 0) {
            alert('请先导入文件');
            return;
        }
        
        const selected = Array.from(formatCheckboxes).filter(cb => cb.checked).map(cb => cb.value);
        if (selected.length === 0) {
            alert('请选择至少一种格式');
            return;
        }
        
        loadingIndicator.style.display = 'block';
        loadingIndicator.textContent = '📦 正在打包...';
        
        const zip = new JSZip();
        const folder = zip.folder('字幕文件');
        
        if (parsedDataArray.length > 0) {
            parsedDataArray.forEach(fileData => {
                selected.forEach(f => {
                    const out = convertToFormat(fileData.data, f);
                    folder.file(`${fileData.name}.${f}`, out);
                });
            });
        } else if (subtitles.length > 0) {
            const baseName = currentFileName || 'output';
            selected.forEach(f => {
                const out = convertToFormat(subtitles, f);
                folder.file(`${baseName}.${f}`, out);
            });
        }
        
        const content = await zip.generateAsync({type:'blob'});
        const url = URL.createObjectURL(content);
        const a = document.createElement('a');
        a.download = `字幕文件_${new Date().toISOString().slice(0,10)}.zip`;
        a.href = url;
        a.click();
        URL.revokeObjectURL(url);
        
        loadingIndicator.style.display = 'none';
    });

    toggleBtn.addEventListener('click', () => {
        isFullPreview = !isFullPreview;
        previewDiv.classList.toggle('full', isFullPreview);
        toggleBtn.innerText = isFullPreview ? '🔼 收起' : '🔽 展开';
    });

    // ===== 工具按钮 =====
    clearAllBtn.addEventListener('click', () => {
        files = []; parsedDataArray = []; subtitles = [];
        currentFileName = '';
        subtitleFileName.textContent = '';
        audioFileName.textContent = '';
        audioTitle.textContent = '';
        cancelSubtitle.style.display = 'none';
        cancelAudio.style.display = 'none';
        fileListContainer.style.display = 'none';
        statsFileCount.innerText = '0';
        statTotalLines.innerText = '0';
        statTotalDuration.innerText = '0';
        statAvgSpeed.innerText = '0';
        statCharCount.innerText = '0';
        previewDiv.innerText = '等待文件导入……';
        playerContainer.style.display = 'none';
        subtitleList.style.display = 'none';
        currentSubtitle.textContent = '等待播放……';
        if (audioSource) {
            audioSource.stop();
            isPlaying = false;
        }
        audioBuffer = null;
    });

    saveConfigBtn.addEventListener('click', () => {
        localStorage.setItem('fogConfig', JSON.stringify({features:featureFlags}));
        alert('配置已保存');
    });

    loadConfigBtn.addEventListener('click', () => {
        const saved = localStorage.getItem('fogConfig');
        if (!saved) { alert('无保存配置'); return; }
        const cfg = JSON.parse(saved);
        featureFlags = cfg.features || featureFlags;
        document.querySelectorAll('#featureToggles input[type="checkbox"]').forEach(cb => {
            cb.checked = !!featureFlags[cb.value];
        });
        alert('配置已加载');
    });

    sampleBtn.addEventListener('click', () => {
        const sample = [
            {start_time:1000, end_time:3500, role:'余邃', content:'你好，示例对话'},
            {start_time:3600, end_time:6200, role:'时洛', content:'测试所有功能'},
            {start_time:6300, end_time:8900, role:'Puppy', content:'统计功能正常显示'}
        ];
        const blob = new Blob([JSON.stringify(sample,null,2)], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.download = 'sample.json';
        a.href = url;
        a.click();
    });

    // ===== 全选/取消全选 =====
    function updateSelectedCount() {
        selectedCountSpan.innerText = document.querySelectorAll('.format-cb:checked').length;
    }
    formatCheckboxes.forEach(cb => cb.addEventListener('change', updateSelectedCount));
    
    selectAllBtn.addEventListener('click', () => {
        formatCheckboxes.forEach(cb => cb.checked = true);
        updateSelectedCount();
    });
    
    deselectAllBtn.addEventListener('click', () => {
        formatCheckboxes.forEach(cb => cb.checked = false);
        updateSelectedCount();
    });
    
    updateSelectedCount();

    // 功能复选框
    document.querySelectorAll('#featureToggles input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', (e) => { featureFlags[e.target.value] = e.target.checked; });
    });

    // ===== 悬停提示系统 =====
    function createTooltip() {
        if (!tooltipElement) {
            tooltipElement = document.createElement('div');
            tooltipElement.className = 'custom-tooltip';
            tooltipElement.style.display = 'none';
            document.body.appendChild(tooltipElement);
        }
        return tooltipElement;
    }

    document.querySelectorAll('[data-tooltip]').forEach(el => {
        el.addEventListener('mouseenter', (e) => {
            const tip = createTooltip();
            tip.textContent = el.getAttribute('data-tooltip');
            tip.style.display = 'block';
            
            const bodyClass = document.body.className;
            if (bodyClass === 'pink') {
                tip.style.background = '#ff99bb';
                tip.style.borderColor = '#ff4d94';
                tip.style.color = '#661133';
            } else if (bodyClass === 'green') {
                tip.style.background = '#99cc99';
                tip.style.borderColor = '#2d862d';
                tip.style.color = '#1a4d1a';
            } else if (bodyClass === 'fresh') {
                tip.style.background = '#99ccff';
                tip.style.borderColor = '#4da6ff';
                tip.style.color = '#1a4d73';
            } else {
                tip.style.background = '#1a1f3a';
                tip.style.borderColor = '#ffd966';
                tip.style.color = '#ffffff';
            }
            
            let left = e.clientX + 15;
            let top = e.clientY + 15;
            
            if (left + tip.offsetWidth > window.innerWidth) {
                left = window.innerWidth - tip.offsetWidth - 10;
            }
            if (top + tip.offsetHeight > window.innerHeight) {
                top = window.innerHeight - tip.offsetHeight - 10;
            }
            
            tip.style.left = left + 'px';
            tip.style.top = top + 'px';
        });
        el.addEventListener('mouseleave', () => {
            if (tooltipElement) tooltipElement.style.display = 'none';
        });
    });

    // 默认隐藏文件列表
    fileListContainer.style.display = 'none';
    
    // 初始化存档列表
    updateSaveList();
    updateLoadList();
})();
</script>
</body>
</html>
